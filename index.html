<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Le Wagon</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <div class="banner">
      <div class="container">
        <h1>Change your life, learn to code</h1>
        <h2>Le Wagon brings tech skills to creative people</h2>
        <a href="#apply-section" class="btn-blue">Apply now</a>
      </div>
    </div>

    <div class="container">
      <h2>Meet the team</h2>
      <img class="avatar" src="images/avatar.jpg" alt="Photo de profil">
    </div>

    <div class="container">
      <h2>Le Wagon's campuses</h2>

      <div class="cards">
        <div class="card">
          <img src="images/london.jpg" alt="Le Wagon london">
          <h3>London</h3>
        </div>

        <div class="card">
          <img src="images/rio.jpg" alt="Le Wagon rio">
          <h3>Rio</h3>
        </div>

        <div class="card">
          <img src="images/shangai.jpg" alt="Le Wagon shangai">
          <h3>Shangai</h3>
        </div>
      </div>
    </div>

    <div id="apply-section">
      <div class="container">
        <h2>Apply here</h2>
        <div data-tf-live="01KMWVRT0N7RDGN3S5W2F19YPE"></div>
      </div>
    </div>

    <script src="https://embed.typeform.com/next/embed.js"></script>
  </body>
</html>
